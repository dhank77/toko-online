<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes subtle-zoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        .animate-subtle-zoom { animation: subtle-zoom 20s infinite alternate ease-in-out; }

<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopNavBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface shadow-sm h-20 flex items-center">
<div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-20">
<!-- Brand Logo -->
<div class="flex items-center gap-sm">
<span class="text-headline-md font-headline-md font-bold text-primary">ShopComposed</span>
</div>
<!-- Navigation Links (Desktop) -->
<nav class="hidden md:flex items-center gap-lg">
<a class="text-primary font-bold border-b-2 border-primary pb-1 font-body-md" href="#">Categories</a>
<a class="text-on-surface-variant hover:text-primary transition-colors duration-200 font-body-md" href="#">Help Center</a>
</nav>
<!-- Search Bar (on_left in design shell terminology) -->
<div class="hidden lg:flex flex-1 max-w-md mx-xl relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full pl-12 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-full font-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" placeholder="Search for products, brands..." type="text"/>
<!-- Auto-suggest overlay (hidden by default) -->
<div class="absolute top-full left-0 right-0 mt-2 bg-surface rounded-xl shadow-lg border border-outline-variant hidden group-focus-within:block overflow-hidden">
<div class="p-sm hover:bg-surface-container transition-colors cursor-pointer text-body-sm">Trending: Modern Minimalist Lamp</div>
<div class="p-sm hover:bg-surface-container transition-colors cursor-pointer text-body-sm">New: Sustainable Tech Accessories</div>
<div class="p-sm hover:bg-surface-container transition-colors cursor-pointer text-body-sm">Sale: Premium Leather Goods</div>
</div>
</div>
<!-- Actions -->
<div class="flex items-center gap-md">
<button class="relative p-2 text-on-surface-variant hover:text-primary transition-all scale-95 active:scale-90">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span class="absolute top-0 right-0 bg-primary text-on-primary text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">3</span>
</button>
<div class="hidden md:flex items-center gap-sm">
<button class="p-2 text-on-surface-variant hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</div>
<button class="md:hidden p-2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</div>
</header>
<main class="pt-20">
<!-- Hero Section -->
<section class="relative overflow-hidden bg-surface-container-highest h-[500px] md:h-[640px] flex items-center">
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center animate-subtle-zoom" data-alt="A cinematic, high-fashion wide shot of a minimalist luxury interior with a single striking piece of modern furniture. The lighting is dramatic and warm, coming from a large floor-to-ceiling window casting soft shadows. The color palette features deep professional blues, crisp whites, and metallic accents, creating an atmosphere of composed authority and frictionless retail excellence. The camera angle is low, emphasizing the grandeur of the space." style="background-image: url('https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg')"></div>
<div class="absolute inset-0 bg-gradient-to-r from-on-background/80 to-transparent"></div>
</div>
<div class="relative z-10 w-full px-gutter max-w-container-max mx-auto text-on-primary">
<div class="max-w-2xl space-y-md">
<span class="inline-block px-4 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-md">Limited Time Offer</span>
<h1 class="font-display-lg text-display-lg leading-tight">Elevate Your Lifestyle with Composed Quality</h1></div></div></section></main></body></html>
